stages:
  - build
  - release

variables:
  APP_NAME: "ATDigitalTester"

build:
  stage: build
  image: node:18
  only:
    - tags
    - master

  before_script:
    - npm config set registry https://registry.npmmirror.com

  script:
    - npm install
    - npm run build
    - npm run electron:build -- --win --x64

  artifacts:
    paths:
      - dist/
    expire_in: 7 days

release:
  stage: release
  image: node:18
  only:
    - tags
    - master
  needs:
    - build
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl tar
    - curl -sL https://gitlab.com/gitlab-org/cli/-/releases/latest/downloads/glab-linux-amd64.tar.gz | tar xz
    - mv bin/glab /usr/local/bin/
    - glab --version

  script:
    - VERSION=${CI_COMMIT_REF_NAME#v}
    - echo "Release version: $VERSION"

    # Lấy file từ dist
    - EXE_FILE=$(find dist -name "*.exe" -type f | head -1)
    - LATEST_FILE=$(find dist -name "latest.yml" -type f | head -1)

    - echo "EXE: $EXE_FILE"
    - echo "LATEST: $LATEST_FILE"

    - |
      if [ -z "$EXE_FILE" ]; then
        echo "No .exe file found in dist!"
        exit 1
      fi

    # Tạo release + upload assets lên GitLab Releases
    - |
      if [ -f "$LATEST_FILE" ]; then
        glab release create "v${VERSION}" \
          --title "Release v${VERSION}" \
          --description "Auto build from CI/CD" \
          "$EXE_FILE" \
          "$LATEST_FILE"
      else
        glab release create "v${VERSION}" \
          --title "Release v${VERSION}" \
          --description "Auto build from CI/CD" \
          "$EXE_FILE"
      fi

  artifacts:
    paths:
      - dist/
    expire_in: 30 days